# CHADD PXPICS Home Assistant package
# Version: 0.71 Osmotic Steering
# Purpose: helper entities for Node-RED driven irrigation control with AROYA intent and phase handling

input_select:
  chadd_pxpics_control_mode:
    name: CHADD PXPICS Control Mode
    options:
      - auto
      - assist
      - manual
      - osmotic_steering
    icon: mdi:state-machine

  chadd_pxpics_fallback_mode:
    name: CHADD PXPICS Fallback Mode
    options:
      - pause_only
      - timed_survival
      - alert_only
    icon: mdi:alert-circle-outline

  chadd_pxpics_primary_control:
    name: CHADD PXPICS Primary Control
    options:
      - dryback_first
      - vwc_first
      - hybrid
      - osmotic_first
    icon: mdi:water-percent

  chadd_pxpics_phase_mode:
    name: CHADD PXPICS Phase Mode
    options:
      - p0
      - p1
      - p2
      - gen_1
      - gen_2
      - gen_3
      - gen_4
      - gen_5
      - veg_6
      - veg_7
      - veg_8
      - veg_9
      - veg_10
    icon: mdi:leaf

  chadd_pxpics_growth_stage:
    name: CHADD PXPICS Growth Stage
    options:
      - vegetative
      - flowering
      - bulking
      - harvest
    icon: mdi:sprout
  
  chadd_pxpics_transpiration_method:
    name: CHADD PXPICS Transpiration Method
    options:
      - estimated
      - measured
      - blended
    icon: mdi:weather-windy

  chadd_pxpics_transpiration_source:
    name: CHADD PXPICS Transpiration Source
    options:
      - estimate
      - measurement
      - blend
    icon: mdi:water-outline

input_boolean:
  chadd_pxpics_manual_override_enabled:
    name: CHADD PXPICS Manual Override Enabled
    icon: mdi:hand-extended

  chadd_pxpics_dry_run_mode:
    name: CHADD PXPICS Dry Run Mode
    icon: mdi:test-tube

  chadd_pxpics_skip_next_shot:
    name: CHADD PXPICS Skip Next Shot
    icon: mdi:skip-next

  chadd_pxpics_fallback_alert_enabled:
    name: CHADD PXPICS Fallback Alert Enabled
    icon: mdi:bell-alert

  chadd_pxpics_decision_log_enabled:
    name: CHADD PXPICS Decision Log Enabled
    icon: mdi:book-open-variant

  chadd_pxpics_phase_auto_mode:
    name: CHADD PXPICS Phase Auto Mode
    icon: mdi:auto-fix

  chadd_pxpics_transpiration_enabled:
    name: CHADD PXPICS Transpiration Enabled
    icon: mdi:water-outline

