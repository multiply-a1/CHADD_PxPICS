            "Place WC/EC sensors mid‑slab, between blocks, not at edges, or your data will lie to you about the rootzone.",
            "In rockwool, plants barely feel WC changes between ~20–80% – osmotic (EC) stress is what actually steers them.",
            "You cannot crop‑steer with matric stress in rockwool; only osmotic stress (ECw) really moves the needle.",
            "Always convert bulk EC to pore‑water EC; steering on raw bulk EC means you’re flying with the wrong scale.",
            "Use the *slope* of daily WC decline to estimate transpiration rate instead of guessing plant water use.",
            "Design shots as a few % of block volume, then pause; this prevents channeling and wets the full profile.",
            "Standardize sensor depth/position in every block; random placement destroys comparability between runs.",
            "Let ECw rise during flower set, drop in bulking, then rise again in ripening – use EC curves, not a flat target.",
            "A big ECw swing from morning dryback is normal; the real red flag is ECw that *never* falls overnight.",
            "In cocoa/rockwool, waiting for visible wilt before irrigating is a great way to kill plants outright.",
            "Calibrate WC/EC sensors per substrate; using a “generic” curve on a new media can be wildly wrong.",
            "Line‑cleaning: run acid, then alkaline surfactant, then acid again if you want lines that look brand new.",
